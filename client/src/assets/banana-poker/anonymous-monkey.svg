<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#2a2a2a"/>

  <!-- Ears -->
  <circle cx="18" cy="52" r="12" fill="#6b4c2a"/>
  <circle cx="18" cy="52" r="7" fill="#a0623a"/>
  <circle cx="82" cy="52" r="12" fill="#6b4c2a"/>
  <circle cx="82" cy="52" r="7" fill="#a0623a"/>

  <!-- Head -->
  <ellipse cx="50" cy="47" rx="28" ry="27" fill="#7a5533"/>

  <!-- Face plate -->
  <ellipse cx="50" cy="56" rx="18" ry="15" fill="#c8916a"/>

  <!-- Eyes -->
  <circle cx="41" cy="43" r="5.5" fill="#1a1a1a"/>
  <circle cx="59" cy="43" r="5.5" fill="#1a1a1a"/>
  <circle cx="42.5" cy="41.5" r="1.8" fill="white"/>
  <circle cx="60.5" cy="41.5" r="1.8" fill="white"/>

  <!-- Nose -->
  <ellipse cx="46" cy="54" rx="3" ry="2" fill="#5a3a1a"/>
  <ellipse cx="54" cy="54" rx="3" ry="2" fill="#5a3a1a"/>
  <rect x="47" y="52" width="6" height="2" fill="#c8916a"/>

  <!-- Mouth -->
  <path d="M 42 60 Q 50 66 58 60" stroke="#5a3a1a" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Question mark -->
  <text x="50" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="rgba(255,255,255,0.35)" letter-spacing="1">ANON</text>
</svg>
