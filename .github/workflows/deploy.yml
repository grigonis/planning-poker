name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
          VITE_FIREBASE_EMAIL_LINK_URL: ${{ secrets.VITE_FIREBASE_EMAIL_LINK_URL }}
        run: npm run build

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts || exit 1

      - name: Deploy client (static files)
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            client/dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/keystimate/dist/

      - name: Deploy server files
        run: |
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='/.env' \
            -e "ssh -i ~/.ssh/deploy_key" \
            server/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/keystimate/server/

      - name: Restart server on VPS
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /var/www/keystimate/server && npm ci --omit=dev && (pm2 describe keystimate-server > /dev/null 2>&1 && pm2 restart keystimate-server || pm2 start index.js --name keystimate-server && pm2 save)"
